name: Deploy Production

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Backend tests
        working-directory: server
        run: go test ./...

      - name: Install web dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: Web build
        run: pnpm --dir web build

  deploy-readiness:
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    outputs:
      web_ready: ${{ steps.check.outputs.web_ready }}
      api_ready: ${{ steps.check.outputs.api_ready }}
      web_missing: ${{ steps.check.outputs.web_missing }}
      api_missing: ${{ steps.check.outputs.api_missing }}
    steps:
      - name: Check deploy hooks
        id: check
        env:
          WEB_PROD_DEPLOY_HOOK: ${{ secrets.WEB_PROD_DEPLOY_HOOK }}
          API_RECIPES_PROD_DEPLOY_HOOK: ${{ secrets.API_RECIPES_PROD_DEPLOY_HOOK }}
          API_USERS_PROD_DEPLOY_HOOK: ${{ secrets.API_USERS_PROD_DEPLOY_HOOK }}
          API_FAVORITES_PROD_DEPLOY_HOOK: ${{ secrets.API_FAVORITES_PROD_DEPLOY_HOOK }}
        run: |
          web_ready='true'
          api_ready='true'
          web_missing=''
          api_missing=''

          if [ -z "$WEB_PROD_DEPLOY_HOOK" ]; then
            web_ready='false'
            web_missing='WEB_PROD_DEPLOY_HOOK'
          fi

          for key in API_RECIPES_PROD_DEPLOY_HOOK API_USERS_PROD_DEPLOY_HOOK API_FAVORITES_PROD_DEPLOY_HOOK; do
            value=$(printenv "$key")
            if [ -z "$value" ]; then
              api_ready='false'
              if [ -n "$api_missing" ]; then
                api_missing="$api_missing, "
              fi
              api_missing="$api_missing$key"
            fi
          done

          echo "web_ready=$web_ready" >> "$GITHUB_OUTPUT"
          echo "api_ready=$api_ready" >> "$GITHUB_OUTPUT"
          echo "web_missing=$web_missing" >> "$GITHUB_OUTPUT"
          echo "api_missing=$api_missing" >> "$GITHUB_OUTPUT"

  deploy-web:
    needs: [verify, deploy-readiness]
    if: ${{ needs.deploy-readiness.outputs.web_ready == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger web deploy hook
        env:
          WEB_PROD_DEPLOY_HOOK: ${{ secrets.WEB_PROD_DEPLOY_HOOK }}
        run: |
          test -n "$WEB_PROD_DEPLOY_HOOK"
          curl -fsS -X POST "$WEB_PROD_DEPLOY_HOOK"

  deploy-web-skipped:
    needs: [verify, deploy-readiness]
    if: ${{ needs.deploy-readiness.outputs.web_ready != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Web deploy not configured
        run: |
          echo "Skipping production web deploy: missing secret(s): ${{ needs.deploy-readiness.outputs.web_missing }}"

  deploy-api:
    needs: [verify, deploy-readiness]
    if: ${{ needs.deploy-readiness.outputs.api_ready == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        service:
          - API_RECIPES_PROD_DEPLOY_HOOK
          - API_USERS_PROD_DEPLOY_HOOK
          - API_FAVORITES_PROD_DEPLOY_HOOK
    steps:
      - name: Trigger API deploy hook
        env:
          API_RECIPES_PROD_DEPLOY_HOOK: ${{ secrets.API_RECIPES_PROD_DEPLOY_HOOK }}
          API_USERS_PROD_DEPLOY_HOOK: ${{ secrets.API_USERS_PROD_DEPLOY_HOOK }}
          API_FAVORITES_PROD_DEPLOY_HOOK: ${{ secrets.API_FAVORITES_PROD_DEPLOY_HOOK }}
          SERVICE_KEY: ${{ matrix.service }}
        run: |
          URL=$(printenv "$SERVICE_KEY")
          test -n "$URL"
          curl -fsS -X POST "$URL"

  deploy-api-skipped:
    needs: [verify, deploy-readiness]
    if: ${{ needs.deploy-readiness.outputs.api_ready != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: API deploy not configured
        run: |
          echo "Skipping production API deploy: missing secret(s): ${{ needs.deploy-readiness.outputs.api_missing }}"
